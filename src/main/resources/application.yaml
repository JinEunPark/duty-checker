spring:
  application:
    name: duty-checker
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:h2:mem:duty_checker
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: duty-checker-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration-ms: 3600000     # 1시간
  refresh-expiration-ms: 2592000000 # 30일

server:
  port: 8080

logging:
  level:
    com.guegue.duty_checker: DEBUG
    org.hibernate.SQL: DEBUG
