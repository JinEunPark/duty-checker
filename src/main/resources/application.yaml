spring:
  application:
    name: duty-checker
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:mysql://localhost:3306/duty_checker?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: mypassword
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: duty-checker-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration-ms: 3600000     # 1시간
  refresh-expiration-ms: 7776000000 # 90일

server:
  port: 8080

logging:
  level:
    com.guegue.duty_checker: DEBUG
    org.hibernate.SQL: DEBUG
