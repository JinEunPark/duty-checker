spring:
  application:
    name: duty-checker
  datasource:
    url: jdbc:h2:mem:duty_checker
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.guegue.duty_checker: DEBUG
    org.hibernate.SQL: DEBUG
