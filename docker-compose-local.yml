version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: duty-checker-mysql-local
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: duty_checker
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      TZ: Asia/Seoul
    ports:
      - "13306:3306"
    volumes:
      - mysql-local-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: duty-checker-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis-local-data:/data
    restart: unless-stopped

volumes:
  mysql-local-data:
    driver: local
  redis-local-data:
    driver: local
